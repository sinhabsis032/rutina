<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0e1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mi Rutina"/>
  <meta name="description" content="Rutina diaria — Ingeniería en Informática"/>
  <title>Mi Rutina</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="installBanner" class="install-banner">
  <p>Instalá la app para acceso rápido desde tu pantalla de inicio.</p>
  <button class="install-btn" onclick="installApp()">Instalar</button>
  <button class="install-close" onclick="closeInstall()">×</button>
</div>
<div class="app" id="app">
  <div class="bg-grid"></div>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>

  <!-- NAV TABS -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="home" onclick="switchTab('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </button>
    <button class="tab" data-tab="schedule" onclick="switchTab('schedule')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Horario</span>
    </button>
    <button class="tab" data-tab="progress" onclick="switchTab('progress')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progreso</span>
    </button>
  </nav>

  <!-- TAB: INICIO -->
  <section class="tab-content active" id="tab-home">

    <div class="hero">
      <p class="hero-tag">// sistema de vida activo</p>
      <h1 class="hero-title">Tu rutina.<br><span class="accent">Tu carrera.</span></h1>
    </div>

    <!-- RELOJ + BLOQUE ACTUAL -->
    <div class="now-card">
      <div class="clock-wrap">
        <svg id="clockSvg" width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(0,200,255,0.12)" stroke-width="3"/>
          <circle cx="40" cy="40" r="36" fill="none" stroke="#00c8ff" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="226" stroke-dashoffset="226"
            transform="rotate(-90 40 40)" id="clockRing"/>
          <text x="40" y="34" text-anchor="middle" font-family="Rajdhani,sans-serif"
            font-size="10" fill="rgba(0,200,255,0.5)" font-weight="700" letter-spacing="1">HORA</text>
          <text x="40" y="48" text-anchor="middle" font-family="Rajdhani,sans-serif"
            font-size="20" fill="#00c8ff" font-weight="700" id="clockHH">--</text>
          <text x="40" y="60" text-anchor="middle" font-family="Space Mono,monospace"
            font-size="9" fill="rgba(0,200,255,0.55)" id="clockMM">--</text>
        </svg>
      </div>
      <div class="now-info">
        <div class="now-time" id="nowTime">--:--</div>
        <div class="now-label">Bloque actual</div>
        <div class="now-block-name" id="nowBlock">Cargando...</div>
        <div class="now-phase" id="nowPhase"></div>
      </div>
    </div>

    <!-- PRÓXIMO BLOQUE -->
    <div class="next-card" id="nextCard">
      <div class="next-label">Próximo bloque</div>
      <div class="next-name" id="nextName">—</div>
      <div class="next-time" id="nextTime"></div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num">16h</div>
        <div class="stat-lbl">productivas/día</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">5</div>
        <div class="stat-lbl">días/semana</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-lbl">bloques hoy</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statStreak">—</div>
        <div class="stat-lbl">racha días</div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="section-title">Bloques del día</div>
    <div class="timeline" id="timeline"></div>

    <!-- QUOTE -->
    <div class="quote-card" id="quoteCard">
      <div class="quote-icon">"</div>
      <p class="quote-text" id="quoteText"></p>
      <p class="quote-author" id="quoteAuthor"></p>
    </div>

  </section>

  <!-- TAB: HORARIO -->
  <section class="tab-content" id="tab-schedule">
    <div class="section-title" style="margin-top:1rem;">Horario semanal</div>
    <div class="day-selector">
      <button class="day-btn active" onclick="selectDay(0,this)">L</button>
      <button class="day-btn" onclick="selectDay(1,this)">M</button>
      <button class="day-btn" onclick="selectDay(2,this)">X</button>
      <button class="day-btn" onclick="selectDay(3,this)">J</button>
      <button class="day-btn" onclick="selectDay(4,this)">V</button>
    </div>
    <div class="day-schedule" id="daySchedule"></div>
  </section>

  <!-- TAB: PROGRESO -->
  <section class="tab-content" id="tab-progress">
    <div class="section-title" style="margin-top:1rem;">Tu progreso</div>

    <div class="progress-week" id="progressWeek"></div>

    <div class="checklist-title">Completar bloques de hoy</div>
    <div class="checklist" id="checklist"></div>

    <div class="streak-banner" id="streakBanner"></div>

    <div class="reset-btn-wrap">
      <button class="reset-btn" onclick="resetDay()">Reiniciar día</button>
    </div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
